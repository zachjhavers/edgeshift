<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0a0f1e"/>

  <!-- Market line — faint, lower -->
  <path d="M4 21 L10 15 L16 18 L22 12"
        stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.30"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Our edge line — solid, above market -->
  <path d="M4 17 L10 11 L16 14 L22 8"
        stroke="#06b6d4" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrowhead -->
  <path d="M19 6.5 L23 8 L21.5 12"
        stroke="#06b6d4" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Vertical axis tick marks (subtle) -->
  <line x1="4" y1="24" x2="4" y2="22" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.25" stroke-linecap="round"/>
  <line x1="28" y1="24" x2="28" y2="22" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.25" stroke-linecap="round"/>
  <line x1="4" y1="25" x2="28" y2="25" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.15" stroke-linecap="round"/>
</svg>
